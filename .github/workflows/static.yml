name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          # User / org pages (<user>.github.io) and custom domains serve from root.
          if [[ "$REPO_NAME" == "${OWNER}.github.io" ]]; then
            BASE="/"
          else
            BASE="/${REPO_NAME}/"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Using base path: $BASE"

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.base }}
        run: bun run build

      - name: SPA fallback + Jekyll bypass
        run: |
          # GitHub Pages serves 404.html for unknown paths. Copy the SPA shell
          # so any non-prerendered deep link still boots the client router.
          cp dist/index.html dist/404.html
          # Prevent GitHub Pages from filtering files/dirs starting with "_".
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
